name: Validate

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find static/js -name '*.js' -print0)

      - name: Validate JSON files
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            node -e "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8'))" "$file"
          done < <(find data -name '*.json' -print0)

      - name: Check required site files
        shell: bash
        run: |
          test -f index.html
          test -f 404.html
          test -f mbti-test.html
          test -f personality-types.html
          test -f personality-detail.html
          test -f .nojekyll
