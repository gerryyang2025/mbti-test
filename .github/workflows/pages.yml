name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find static/js -name '*.js' -print0)

      - name: Validate JSON files
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            node -e "JSON.parse(require('fs').readFileSync(process.argv[1], 'utf8'))" "$file"
          done < <(find data -name '*.json' -print0)

      - name: Check required site files
        shell: bash
        run: |
          test -f index.html
          test -f 404.html
          test -f mbti-test.html
          test -f personality-types.html
          test -f personality-detail.html
          test -f .nojekyll

      - name: Build static artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          cp index.html mbti-test.html personality-types.html personality-detail.html 404.html robots.txt .nojekyll _site/
          cp -R data static _site/
          if [ -f CNAME ]; then
            cp CNAME _site/
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
